name: Epic
description: A parent issue that groups a set of related stories under a single architectural concern.
title: "[epic](scope)[x.0]: "
labels: ["epic"]
body:
  - type: markdown
    attributes:
      value: |
        ## Title format
        `[epic](scope)[x.0]: Short descriptive title`
        
        The scope should reflect the primary service, package, or app this epic is anchored to.
        The story number is always `0` for an epic parent.
        
        **Example:** `[epic](services/auth)[1.0]: JWT Authentication Architecture`

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is this epic delivering and why? Reference the ADR or design doc that drives it.
    validations:
      required: true

  - type: input
    id: adr
    attributes:
      label: ADR / Design Reference
      description: Link to the ADR, RFC, or design doc this epic is grounded in.
      placeholder: "e.g. `[ADR-003](link/to/doc)`"
    validations:
      required: false

  - type: textarea
    id: stories
    attributes:
      label: Stories
      description: List all child stories in implementation order. Update this as stories are created.
      placeholder: |
        - [ ] (services/auth)[1.1] Story title
        - [ ] (services/auth)[1.2] Story title
        - [ ] (services/bff)[1.3] Story title
    validations:
      required: true

  - type: textarea
    id: open-questions
    attributes:
      label: Open Questions
      description: Unresolved questions that may affect scope or implementation. Link to the relevant story if one is blocked on them.
      placeholder: |
        | # | Question | Blocking | Resolution |
        |---|---|---|---|
        | 1 | ... | Yes — blocks x.x | ... |
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this epic is done? Should be expressible as a set of verifiable outcomes.
    validations:
      required: true
